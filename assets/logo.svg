<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6c5ce7"/>
      <stop offset="100%" style="stop-color:#a29bfe"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="80" fill="url(#bg)"/>
  
  <!-- W + H monogram -->
  <g transform="translate(200,200)">
    <!-- W shape -->
    <polyline points="-100,-60 -80,50 -60,-20 -40,50 -20,-60" 
     fill="none" stroke="url(#accent)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- H shape -->
    <line x1="15" y1="-60" x2="15" y2="50" stroke="url(#accent)" stroke-width="18" stroke-linecap="round"/>
    <line x1="85" y1="-60" x2="85" y2="50" stroke="url(#accent)" stroke-width="18" stroke-linecap="round"/>
    <line x1="15" y1="-5" x2="85" y2="-5" stroke="url(#accent)" stroke-width="18" stroke-linecap="round"/>
  </g>
  
  <!-- subtle accent dots -->
  <circle cx="80" cy="330" r="4" fill="#6c5ce7" opacity="0.4"/>
  <circle cx="100" cy="340" r="2" fill="#a29bfe" opacity="0.3"/>
  <circle cx="90" cy="350" r="3" fill="#6c5ce7" opacity="0.2"/>
  
  <circle cx="310" cy="70" r="4" fill="#6c5ce7" opacity="0.4"/>
  <circle cx="330" cy="80" r="2" fill="#a29bfe" opacity="0.3"/>
  <circle cx="320" cy="60" r="3" fill="#6c5ce7" opacity="0.2"/>
</svg>